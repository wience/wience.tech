<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex">
    <title>write</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            line-height: 1.6;
            color: #000;
            padding: 32px 20px 60px;
            max-width: 1180px;
            margin: 0 auto;
            transition: background-color 0.5s ease;
        }

        .crumb { font-size: 13px; color: #666; margin-bottom: 22px; }
        .crumb a { color: #666; }

        a { color: #000; text-decoration: underline; text-underline-offset: 2px; }
        a:hover { color: #666; }

        .desk {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 290px;
            gap: 28px;
            align-items: start;
        }

        .writer, .panel, .preview-wrap {
            background: rgba(255, 255, 255, 0.42);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 6px;
        }

        .writer { padding: 22px; }

        .side {
            position: sticky;
            top: 20px;
            display: grid;
            gap: 14px;
        }

        .panel { padding: 16px; }

        .panel h2 {
            font-size: 13px;
            font-weight: normal;
            color: #666;
            margin-bottom: 10px;
            text-transform: lowercase;
        }

        input, textarea {
            font-family: inherit;
            font-size: 16px;
            width: 100%;
            border: none;
            border-bottom: 1px solid #ddd;
            background: transparent;
            padding: 6px 0;
            margin-bottom: 14px;
            outline: none;
        }

        input:focus, textarea:focus { border-color: #999; }

        #title { font-size: clamp(28px, 4vw, 46px); line-height: 1.05; }
        #slug, #description, #tags { font-size: 13px; color: #666; }

        textarea {
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 16px;
            min-height: 58vh;
            resize: vertical;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.55);
        }

        .bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }
        .bar button, .bar label {
            font-family: inherit;
            font-size: 14px;
            line-height: 1;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(0, 0, 0, 0.16);
            border-radius: 4px;
            color: #000;
            cursor: pointer;
            padding: 10px 12px;
            text-align: center;
        }
        .bar button:hover, .bar label:hover { background: rgba(0, 0, 0, 0.04); }
        #publish { grid-column: 1 / -1; }
        #status {
            display: block;
            font-size: 13px;
            color: #666;
            font-style: italic;
            margin-top: 10px;
        }

        #postList { font-size: 13px; color: #666; }
        #postList a {
            display: inline-block;
            margin: 0 8px 8px 0;
            color: #666;
        }

        .draft-list { display: grid; gap: 9px; font-size: 13px; }
        .draft-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: start;
            border-top: 1px solid rgba(0, 0, 0, 0.07);
            padding-top: 9px;
        }
        .draft-row:first-child { border-top: none; padding-top: 0; }
        .draft-row a { color: #000; }
        .draft-row small { display: block; color: #777; margin-top: 1px; }
        .draft-row button {
            font-family: inherit;
            font-size: 12px;
            color: #777;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .draft-row button:hover { color: #000; }

        .tag-picks {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .tag-picks button {
            font-family: inherit;
            font-size: 12px;
            color: #555;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(0, 0, 0, 0.13);
            border-radius: 999px;
            cursor: pointer;
            padding: 3px 8px;
        }

        .tag-picks button:hover { color: #000; border-color: rgba(0, 0, 0, 0.35); }

        #promptLine {
            font-size: 14px;
            font-style: italic;
            color: #444;
            margin-top: 10px;
            display: none;
        }

        .cheat {
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
            font-size: 13px;
            color: #555;
        }

        .cheat p {
            display: grid;
            grid-template-columns: 122px 1fr;
            gap: 10px;
            align-items: baseline;
        }

        .cheat code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            color: #111;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 3px;
            padding: 2px 4px;
        }

        .preview-wrap { margin-top: 28px; padding: 22px; max-width: 720px; }
        h2.section { font-size: 14px; font-weight: normal; color: #666; margin-bottom: 14px; }

        /* preview: mirror the blog's post styles */
        #preview h1 { font-size: 24px; font-weight: normal; margin-bottom: 4px; }
        #preview h2 { font-size: 18px; font-weight: normal; margin-top: 28px; margin-bottom: 10px; }
        #preview h3 { font-size: 16px; font-weight: bold; margin-top: 24px; margin-bottom: 8px; }
        #preview p { margin-bottom: 14px; }
        #preview ul, #preview ol { margin-left: 22px; margin-bottom: 14px; }
        #preview li { margin-bottom: 4px; }
        #preview figure { margin: 28px 0; }
        #preview figure img { display: block; width: 100%; border-radius: 3px; }
        #preview figcaption { font-size: 13px; color: #666; font-style: italic; text-align: center; margin-top: 8px; }
        #preview blockquote { border-left: 2px solid #ccc; padding-left: 14px; color: #444; font-style: italic; margin-bottom: 14px; }
        #preview code { font-family: monospace; font-size: 13px; background: rgba(0, 0, 0, 0.05); padding: 1px 4px; border-radius: 3px; }
        #preview pre { background: rgba(0, 0, 0, 0.04); padding: 14px; border-radius: 3px; overflow-x: auto; margin-bottom: 14px; line-height: 1.5; }
        #preview pre code { background: none; padding: 0; }
        #preview hr { border: none; border-top: 1px solid #ddd; width: 100px; margin: 30px auto; }

        @media (max-width: 820px) {
            body { padding-top: 22px; }
            .desk { grid-template-columns: 1fr; }
            .side { position: static; }
            .writer, .panel, .preview-wrap { padding: 14px; }
            textarea { min-height: 420px; }
            .preview-wrap { max-width: none; }
        }
    </style>
</head>

<body>
    <p class="crumb"><a href="/">wience.tech</a> · <a href="/blog/">writing</a> · editor</p>

    <main class="desk">
        <section class="writer">
            <input id="title" placeholder="Title" autocomplete="off">
            <input id="slug" placeholder="slug (auto from title)" autocomplete="off" spellcheck="false">
            <input id="description" placeholder="One-line description (optional)" autocomplete="off">
            <input id="tags" placeholder="tags: ai, coding, books (optional)" autocomplete="off" spellcheck="false">
            <p id="tagPicks" class="tag-picks"></p>
            <textarea id="body" placeholder="Write in markdown. Images: use “insert image” on the right."></textarea>
        </section>

        <aside class="side">
            <section class="panel">
                <h2>actions</h2>
                <p class="bar">
                    <button id="publish">publish</button>
                    <button id="saveDraft">save draft</button>
                    <label for="imageFile">insert image</label>
                    <input type="file" id="imageFile" accept="image/*" style="display:none">
                    <button id="newPost">new</button>
                    <button id="promptBtn">prompt</button>
                    <button id="setToken">token</button>
                </p>
                <span id="status"></span>
                <p id="promptLine"></p>
            </section>

            <section class="panel">
                <h2>posts</h2>
                <div id="postList"></div>
            </section>

            <section class="panel">
                <h2>drafts</h2>
                <div id="draftList" class="draft-list"></div>
            </section>

            <section class="panel">
                <h2>markdown</h2>
                <div class="cheat">
                    <p><code># Title</code><span>big heading</span></p>
                    <p><code>## Section</code><span>section heading</span></p>
                    <p><code>*italic*</code><span>italic</span></p>
                    <p><code>**bold**</code><span>bold</span></p>
                    <p><code>[text](url)</code><span>link</span></p>
                    <p><code>![cap | 280](url)</code><span>small image</span></p>
                    <p><code>- item</code><span>bullet</span></p>
                    <p><code>&gt; quote</code><span>quote</span></p>
                    <p><code>---</code><span>divider</span></p>
                    <p><code>`code`</code><span>inline code</span></p>
                </div>
            </section>
        </aside>
    </main>

    <section class="preview-wrap">
        <h2 class="section">preview</h2>
        <div id="preview"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script>
        const REPO = 'wience/wience.tech';
        const API = `https://api.github.com/repos/${REPO}/contents/`;
        const $ = (id) => document.getElementById(id);

        // same time-aware background as the rest of the site
        const hour = new Date().getHours();
        document.body.style.backgroundColor =
            hour >= 5 && hour < 12 ? "#fffef5" :
            hour >= 12 && hour < 17 ? "#ffffff" :
            hour >= 17 && hour < 21 ? "#fff8f5" : "#f5f7ff";

        // same figure rendering as build.js so the preview matches the real post
        function imageMeta(text) {
            const m = String(text || '').match(/^(.*?)\s*\|\s*(\d{2,4})(?:px)?$/);
            return { caption: m ? m[1].trim() : text, width: m ? m[2] : '' };
        }

        marked.use({
            renderer: {
                image(token) {
                    const meta = imageMeta(token.text);
                    const src = token.href.startsWith('images/') ? '/blog/' + token.href : token.href;
                    const style = meta.width ? ` style="max-width:${meta.width}px;margin-left:auto;margin-right:auto"` : '';
                    const cap = meta.caption ? `<figcaption>${meta.caption}</figcaption>` : '';
                    return `<figure${style}><img src="${src}" alt="${meta.caption || ''}">${cap}</figure>`;
                }
            }
        });

        // --- token ---
        const getToken = () => localStorage.getItem('gh_token') || '';
        $('setToken').onclick = () => {
            const t = prompt('Fine-grained GitHub token with Contents read/write on wience/wience.tech:', getToken());
            if (t !== null) { localStorage.setItem('gh_token', t.trim()); loadPostList(); }
        };
        const headers = () => ({
            'Authorization': 'Bearer ' + getToken(),
            'Accept': 'application/vnd.github+json',
        });

        // --- helpers ---
        const status = (msg) => { $('status').textContent = msg; };
        const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        const slugify = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        const parseTags = (s) => [...new Set(s.split(',').map((t) => slugify(t.trim())).filter(Boolean))];
        const b64encode = (str) => {
            const bytes = new TextEncoder().encode(str);
            let bin = '';
            bytes.forEach((b) => bin += String.fromCharCode(b));
            return btoa(bin);
        };
        const b64decode = (b64) => {
            const bin = atob(b64.replace(/\n/g, ''));
            return new TextDecoder().decode(Uint8Array.from(bin, (c) => c.charCodeAt(0)));
        };

        let slugTouched = false;
        let loadedDate = ''; // preserve original date when editing
        let activeDraftId = '';
        $('slug').addEventListener('input', () => { slugTouched = true; });
        $('title').addEventListener('input', () => {
            if (!slugTouched) $('slug').value = slugify($('title').value);
        });

        function currentDraft() {
            return {
                id: activeDraftId || String(Date.now()),
                title: $('title').value,
                slug: $('slug').value,
                description: $('description').value,
                tags: $('tags').value,
                body: $('body').value,
                updatedAt: new Date().toISOString(),
            };
        }

        const hasDraftContent = (d) => [d.title, d.slug, d.description, d.tags, d.body].join('').trim();
        const readDrafts = () => {
            try { return JSON.parse(localStorage.getItem('drafts') || '[]'); }
            catch { return []; }
        };
        const writeDrafts = (drafts) => localStorage.setItem('drafts', JSON.stringify(drafts));

        function renderDrafts() {
            const drafts = readDrafts();
            if (!drafts.length) { $('draftList').textContent = 'no saved drafts yet'; return; }
            $('draftList').innerHTML = drafts.map((d) => {
                const name = d.title || d.slug || d.body.split('\n')[0] || 'untitled';
                const when = d.updatedAt ? new Date(d.updatedAt).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
                return `<div class="draft-row">
                    <span><a href="#" data-load-draft="${esc(d.id)}">${esc(name)}</a><small>${esc(when)}</small></span>
                    <button data-delete-draft="${esc(d.id)}">delete</button>
                </div>`;
            }).join('');
        }

        function saveDraft(showStatus = true) {
            const draft = currentDraft();
            if (!hasDraftContent(draft)) return showStatus && status('nothing to save');
            activeDraftId = draft.id;
            writeDrafts([draft, ...readDrafts().filter((d) => d.id !== draft.id)]);
            renderDrafts();
            if (showStatus) status('draft saved');
        }

        function loadDraft(id) {
            const draft = readDrafts().find((d) => d.id === id);
            if (!draft) return status('draft missing');
            activeDraftId = draft.id;
            loadedDate = '';
            $('title').value = draft.title || '';
            $('slug').value = draft.slug || '';
            $('description').value = draft.description || '';
            $('tags').value = draft.tags || '';
            $('body').value = draft.body || '';
            slugTouched = !!draft.slug;
            refresh();
            status('draft loaded');
        }

        function deleteDraft(id) {
            if (!confirm('Delete this draft?')) return;
            writeDrafts(readDrafts().filter((d) => d.id !== id));
            if (activeDraftId === id) activeDraftId = '';
            renderDrafts();
            status('draft deleted');
        }

        // --- live preview + draft autosave ---
        function refresh() {
            $('preview').innerHTML = marked.parse($('body').value);
            localStorage.setItem('draft', JSON.stringify({
                title: $('title').value, slug: $('slug').value,
                description: $('description').value, tags: $('tags').value, body: $('body').value,
            }));
            if (activeDraftId) saveDraft(false);
        }
        ['title', 'slug', 'description', 'tags', 'body'].forEach((id) => $(id).addEventListener('input', refresh));

        const draft = JSON.parse(localStorage.getItem('draft') || 'null');
        if (draft) {
            $('title').value = draft.title; $('slug').value = draft.slug;
            $('description').value = draft.description; $('tags').value = draft.tags || ''; $('body').value = draft.body;
            slugTouched = !!draft.slug;
            refresh();
        }

        // --- github contents api ---
        async function getSha(path) {
            const res = await fetch(API + path, { headers: headers() });
            return res.ok ? (await res.json()).sha : null;
        }

        async function putFile(path, contentB64, message) {
            const sha = await getSha(path);
            const res = await fetch(API + path, {
                method: 'PUT',
                headers: headers(),
                body: JSON.stringify({ message, content: contentB64, ...(sha && { sha }) }),
            });
            if (!res.ok) throw new Error(`${res.status}: ${(await res.json()).message}`);
            return sha ? 'updated' : 'created';
        }

        // --- publish ---
        $('publish').onclick = async () => {
            const title = $('title').value.trim();
            const slug = $('slug').value.trim();
            if (!title || !slug) return status('need a title');
            if (!getToken()) return $('setToken').click();
            const date = loadedDate || new Date().toISOString().slice(0, 10);
            const desc = $('description').value.trim();
            const tags = parseTags($('tags').value);
            const md = `---\ntitle: ${title}\ndate: ${date}\n${desc ? `description: ${desc}\n` : ''}${tags.length ? `tags: ${tags.join(', ')}\n` : ''}---\n\n${$('body').value.trim()}\n`;
            status('publishing…');
            try {
                const verb = await putFile(`posts/${slug}.md`, b64encode(md), `Post: ${title}`);
                status(`${verb} — deploying, live at /blog/${slug}/?v=${Date.now()} in ~1 min`);
                loadPostList();
            } catch (e) { status('failed — ' + e.message); }
        };

        $('saveDraft').onclick = () => saveDraft();

        // --- image upload ---
        $('imageFile').addEventListener('change', async () => {
            const file = $('imageFile').files[0];
            if (!file) return;
            if (!getToken()) return $('setToken').click();
            const name = slugify(file.name.replace(/\.[^.]+$/, '')) + file.name.match(/\.[^.]+$/)[0].toLowerCase();
            status('uploading image…');
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    await putFile(`posts/images/${name}`, reader.result.split(',')[1], `Image: ${name}`);
                    const box = $('body');
                    const at = box.selectionStart;
                    box.value = box.value.slice(0, at) + `\n![caption here](images/${name})\n` + box.value.slice(at);
                    refresh();
                    status(`image added (preview shows it after deploy)`);
                } catch (e) { status('image failed — ' + e.message); }
            };
            reader.readAsDataURL(file);
            $('imageFile').value = '';
        });

        // --- load & edit existing posts ---
        async function loadPost(name) {
            status('loading…');
            const res = await fetch(API + 'posts/' + name, { headers: headers() });
            if (!res.ok) return status('load failed');
            const md = b64decode((await res.json()).content);
            const m = md.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            const meta = {};
            if (m) for (const line of m[1].split('\n')) {
                const i = line.indexOf(':');
                if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
            }
            $('title').value = meta.title || '';
            $('slug').value = name.replace(/\.md$/, '');
            $('description').value = meta.description || '';
            $('tags').value = meta.tags || '';
            $('body').value = (m ? m[2] : md).trim();
            slugTouched = true;
            activeDraftId = '';
            loadedDate = meta.date || '';
            refresh();
            status('');
        }

        async function loadPostList() {
            if (!getToken()) { $('postList').textContent = 'set a token to load posts'; return; }
            const res = await fetch(API + 'posts', { headers: headers() });
            if (!res.ok) { $('postList').textContent = 'could not list posts (check token)'; return; }
            const files = (await res.json()).filter((f) => f.type === 'file' && f.name.endsWith('.md') && f.name !== 'CLAUDE.md');
            $('postList').innerHTML = 'edit: ' + files.map((f) =>
                `<a href="#" data-name="${f.name}">${f.name.replace(/\.md$/, '')}</a>`).join('');
            $('postList').querySelectorAll('a').forEach((a) => {
                a.onclick = (e) => { e.preventDefault(); loadPost(a.dataset.name); };
            });
        }

        $('draftList').onclick = (e) => {
            const load = e.target.closest('[data-load-draft]');
            const del = e.target.closest('[data-delete-draft]');
            if (load) { e.preventDefault(); loadDraft(load.dataset.loadDraft); }
            if (del) deleteDraft(del.dataset.deleteDraft);
        };

        const PRESET_TAGS = ['ai', 'coding', 'books', 'school', 'cebu', 'startups', 'work', 'life', 'learning', 'notes'];
        $('tagPicks').innerHTML = PRESET_TAGS.map((t) => `<button type="button" data-tag="${t}">#${t}</button>`).join('');
        $('tagPicks').onclick = (e) => {
            const tag = e.target.dataset.tag;
            if (!tag) return;
            $('tags').value = parseTags($('tags').value + ',' + tag).join(', ');
            refresh();
        };

        // --- writing prompts ---
        const PROMPTS = [
            "What's something you changed your mind about this year, and what changed it?",
            "Describe a belief most people around you hold that you think is wrong.",
            "What did building Folderly teach you that no job could have?",
            "Write about a time you were completely wrong and didn't realize it for months.",
            "What's the most useful thing you learned the hard way?",
            "What do people misunderstand about where you're from?",
            "What's a tool, habit, or idea you can't believe more people don't use?",
            "Write the advice you'd give yourself three years ago.",
            "What's something you do differently from everyone else in your field? Why?",
            "Describe the moment you realized you could actually build things people want.",
            "What's overrated? Make the case.",
            "What's underrated? Make the case.",
            "Write about a failure that turned out to be load-bearing for a later success.",
            "What's a question you keep coming back to?",
            "Explain something technical you know deeply, to a smart 15-year-old.",
            "What would you work on if money were irrelevant?",
            "What's the biggest difference between how work looks from outside and inside?",
            "Write about someone who changed how you think.",
            "What rule did you break that you're glad you broke?",
            "What does everyone in your industry pretend to know?",
            "Describe a small decision that compounded into something big.",
            "What's the strongest argument against something you believe? Steelman it, then respond.",
            "What surprised you most about getting users at scale?",
            "Write about the gap between how something is taught and how it's actually done.",
            "What's a story you tell in person that you've never written down?",
            "What did you stop doing, and what happened when you stopped?",
            "What's obvious to you but apparently not to others?",
            "Write about a time constraints made the work better.",
            "What would you tell a kid in Cebu with a laptop and no connections?",
            "What's the last thing that made you go 'wait, that can't be right' — and was it?",
        ];
        let promptDeck = [];
        $('promptBtn').onclick = () => {
            if (!promptDeck.length) promptDeck = PROMPTS.slice().sort(() => Math.random() - 0.5);
            $('promptLine').textContent = promptDeck.pop();
            $('promptLine').style.display = 'block';
        };

        $('newPost').onclick = () => {
            ['title', 'slug', 'description', 'tags', 'body'].forEach((id) => $(id).value = '');
            slugTouched = false;
            loadedDate = '';
            activeDraftId = '';
            refresh();
            status('');
        };

        renderDrafts();
        loadPostList();
    </script>
</body>

</html>
